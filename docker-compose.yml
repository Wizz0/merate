services:
  postgres:
    image: postgres:18
    container_name: merate_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: merate
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"  # Хост: 5433, Контейнер: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d  # Автоматические миграции
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: merate_backend
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: